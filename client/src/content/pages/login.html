
    <div class="bg-particles" id="bgParticles"></div>

    
    <div class="backdrop-blur-overlay"></div>

    
    <div class="card">
      
      <div class="left-panel">
        <a class="auth-brand" href="/">Legacy Awards</a>
        <div class="award-photo">
          <img src="/images/hero.png" alt="Gold trophy and crystal awards" />
        </div>
        <div class="auth-proof">
          <span>Premium awards</span>
          <strong>Since 2001</strong>
        </div>
      </div>
      

      
      <div class="right-panel">
        <button class="back-btn" onclick="history.back()" aria-label="Go back">
          <svg
            width="18"
            height="18"
            viewBox="0 0 18 18"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            class="back-btn-svg"
          >
            <path
              d="M11 14L6 9L11 4"
              stroke="#5c1a1a"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <h1 class="form-title">Create an Account</h1>
        <p class="form-subtitle">
          Already have an account?
          <a href="#" onclick="toggleForm(event)">Log in</a>
        </p>

        <form id="signupForm" onsubmit="handleSubmit(event)">
          
          <div class="field-row signup-only">
            <div class="field-group">
              <label for="firstName">First Name</label>
              <input
                type="text"
                id="firstName"
                placeholder="John"
                autocomplete="given-name"
              />
            </div>
            <div class="field-group">
              <label for="lastName">Last Name</label>
              <input
                type="text"
                id="lastName"
                placeholder="Last Name"
                autocomplete="family-name"
              />
            </div>
          </div>

          
          <div class="field-full">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="Email Address"
              autocomplete="email"
            />
          </div>

          
          <div class="field-full">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                placeholder="Password"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="eye-toggle"
                id="eyeBtn"
                onclick="togglePassword()"
                aria-label="Toggle password visibility"
              >
                
                <svg
                  id="eyeClosed"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <line
                    x1="1"
                    y1="1"
                    x2="23"
                    y2="23"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
                
                <svg
                  id="eyeOpen"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  style="display: none"
                >
                  <path
                    d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12Z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                </svg>
              </button>
            </div>
          </div>

          
          <button type="submit" class="btn-create">Create Account</button>

          
          <div class="terms-row signup-only">
            <input type="checkbox" id="terms" />
            <label for="terms">
              I agree to the <a href="#">Terms &amp; Condition</a>
            </label>
          </div>

          
          <div class="or-divider"><span>or</span></div>

          
          <div class="social-row">
            <button type="button" class="btn-social">
              
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"
                  fill="#4285F4"
                />
                <path
                  d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"
                  fill="#34A853"
                />
                <path
                  d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"
                  fill="#FBBC05"
                />
                <path
                  d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"
                  fill="#EA4335"
                />
              </svg>
              Continue with Google
            </button>
            <button type="button" class="btn-social">
              
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle cx="9" cy="9" r="9" fill="#1877F2" />
                <path
                  d="M12.47 11.25l.38-2.47H10.4V7.24c0-.68.33-1.33 1.39-1.33h1.08V3.79s-.98-.17-1.92-.17c-1.96 0-3.24 1.19-3.24 3.34v1.82H5.53v2.47h2.18V18h2.68v-6.75h2.08Z"
                  fill="#fff"
                />
              </svg>
              Continue with Facebook
            </button>
          </div>
        </form>
      </div>
      
    </div>
