<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./images/images.jpg">
    <title>LegacyAwards – Create Account</title>
    <link
      href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap)"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        background: url(./images/bg.png);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 50% at 20% 50%,
            rgba(180, 130, 20, 0.12) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 40% 60% at 80% 30%,
            rgba(100, 60, 180, 0.15) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 40% at 60% 80%,
            rgba(30, 80, 180, 0.1) 0%,
            transparent 60%
          );
        pointer-events: none;
      }

      /* Floating background particles */
      .bg-particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .bg-particles span {
        position: absolute;
        border-radius: 50%;
        animation: floatParticle linear infinite;
        opacity: 0;
      }
      @keyframes floatParticle {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-10vh) scale(1);
          opacity: 0;
        }
      }

      /* Blurred outer region overlay */
      .backdrop-blur-overlay {
        position: fixed;
        inset: 0;
        backdrop-filter: blur(35px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 0;
      }

      /* Main centered card */
      .card {
        position: relative;
        z-index: 10;
        display: flex;
        width: min(900px, 95vw);
        max-height: 750px;
        border-radius: 50px;
        overflow: hidden;
        box-shadow: 4px 16px 64px rgba(139, 109, 89, 0.15);
        background: #f7f2f0;
      }

      /* ── LEFT PANEL ── */
      .left-panel {
        flex: 0 0 48%;
        position: relative;
        background: #fff;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        margin: 10px;
        border-radius: 50px;
      }

      /* ── RIGHT PANEL ── */
      .right-panel {
        flex: 1;
        background: #f7f2f0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 36px 44px;
        position: relative;
        overflow-y: auto;
      }

      .back-btn {
        position: absolute;
        top: 22px;
        left: 22px;
        width: 32px;
        height: 32px;
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: background 0.2s;
        color: #5c1a1a;
      }
      .back-btn:hover {
        background: #f0f0f0;
      }

      .form-title {
        font-size: 28px;
        font-weight: 700;
        color: #c9a84c;
        margin-bottom: 6px;
        line-height: 1.2;
      }

      .form-subtitle {
        font-size: 13px;
        color: #666;
        margin-bottom: 22px;
      }
      .form-subtitle a {
        color: #0d0d0d;
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1.5px solid #0d0d0d;
        padding-bottom: 1px;
        transition: opacity 0.2s;
      }
      .form-subtitle a:hover {
        opacity: 0.65;
      }

      /* Field row */
      .field-row {
        display: flex;
        gap: 12px;
        margin-bottom: 14px;
      }
      .field-group {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .field-group + .field-group {
        flex: 1;
      }

      label {
        font-size: 12px;
        font-weight: 500;
        color: #333;
        margin-bottom: 5px;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: #1a1a1a;
        background: #fff;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      input::placeholder {
        color: #aaa;
        font-size: 13px;
      }
      input:focus {
        border-color: #999;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
      }

      .password-wrapper {
        position: relative;
      }
      .password-wrapper input {
        padding-right: 44px;
      }
      .eye-toggle {
        position: absolute;
        right: 13px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        color: #999;
        display: flex;
        align-items: center;
        transition: color 0.2s;
      }
      .eye-toggle:hover {
        color: #555;
      }

      .field-full {
        margin-bottom: 14px;
      }

      /* Create account button */
      .btn-create {
        width: 100%;
        padding: 13px;
        background: #5c1a1a;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s,
          box-shadow 0.2s;
        margin-bottom: 14px;
        letter-spacing: 0.01em;
      }
      .btn-create:hover {
        background: #2a2a2a;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      }
      .btn-create:active {
        transform: scale(0.99);
      }

      /* Terms checkbox */
      .terms-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .terms-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #0d0d0d;
        cursor: pointer;
        flex-shrink: 0;
        border-radius: 4px;
      }
      .terms-row label {
        font-size: 12px;
        color: #555;
        margin: 0;
        cursor: pointer;
      }
      .terms-row a {
        color: #0d0d0d;
        font-weight: 600;
        text-decoration: underline;
      }

      /* OR divider */
      .or-divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .or-divider::before,
      .or-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e8e8e8;
      }
      .or-divider span {
        font-size: 12px;
        color: #aaa;
        font-weight: 500;
        white-space: nowrap;
      }

      /* Social buttons */
      .social-row {
        display: flex;
        gap: 10px;
      }
      .btn-social {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 10px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        background: #fff;
        font-size: 13px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        color: #333;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .btn-social:hover {
        background: #f8f8f8;
        border-color: #ccc;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
      }
      .btn-social svg {
        flex-shrink: 0;
      }

      /* Scrollbar for right panel */
      .right-panel::-webkit-scrollbar {
        width: 4px;
      }
      .right-panel::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 4px;
      }

      /* Responsive */
      @media (max-width: 640px) {
        .card {
          flex-direction: column;
          min-height: unset;
        }
        .left-panel {
          flex: 0 0 220px;
        }
        .right-panel {
          padding: 28px 24px;
        }
        .form-title {
          font-size: 22px;
        }
        .field-row {
          flex-direction: column;
          gap: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- Blur overlay behind the card -->
    <div class="backdrop-blur-overlay"></div>

    <!-- Main Card -->
    <div class="card">
      <!-- ══ LEFT PANEL ══ -->
      <div class="left-panel">
        <img src="./images/hero.png" alt="" />
      </div>
      <!-- ══ END LEFT PANEL ══ -->

      <!-- ══ RIGHT PANEL ══ -->
      <div class="right-panel">
        <button class="back-btn" onclick="history.back()" aria-label="Go back">
          <svg
            width="18"
            height="18"
            viewBox="0 0 18 18"
            fill="none"
            xmlns="[w3.org](http://www.w3.org/2000/svg)"
            class="back-btn-svg"
          >
            <path
              d="M11 14L6 9L11 4"
              stroke="#5c1a1a"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <h1 class="form-title">Create an Account</h1>
        <p class="form-subtitle">
          Already have an account?
          <a href="#" onclick="toggleForm(event)">Log in</a>
        </p>

        <form id="signupForm" onsubmit="handleSubmit(event)">
          <!-- Name row -->
          <div class="field-row">
            <div class="field-group">
              <label for="firstName">First Name</label>
              <input
                type="text"
                id="firstName"
                placeholder="John"
                autocomplete="given-name"
              />
            </div>
            <div class="field-group">
              <label for="lastName">Last Name</label>
              <input
                type="text"
                id="lastName"
                placeholder="Last Name"
                autocomplete="family-name"
              />
            </div>
          </div>

          <!-- Email -->
          <div class="field-full">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="Email Address"
              autocomplete="email"
            />
          </div>

          <!-- Password -->
          <div class="field-full">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                placeholder="Password"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="eye-toggle"
                id="eyeBtn"
                onclick="togglePassword()"
                aria-label="Toggle password visibility"
              >
                <!-- Eye closed (default) -->
                <svg
                  id="eyeClosed"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="[w3.org](http://www.w3.org/2000/svg)"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <line
                    x1="1"
                    y1="1"
                    x2="23"
                    y2="23"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
                <!-- Eye open -->
                <svg
                  id="eyeOpen"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="[w3.org](http://www.w3.org/2000/svg)"
                  style="display: none"
                >
                  <path
                    d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12Z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                </svg>
              </button>
            </div>
          </div>

          <!-- Create Account Button -->
          <button type="submit" class="btn-create">Create Account</button>

          <!-- Terms -->
          <div class="terms-row">
            <input type="checkbox" id="terms" />
            <label for="terms">
              I agree to the <a href="#">Terms &amp; Condition</a>
            </label>
          </div>

          <!-- OR divider -->
          <div class="or-divider"><span>or</span></div>

          <!-- Social buttons -->
          <div class="social-row">
            <button type="button" class="btn-social">
              <!-- Google -->
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                xmlns="[w3.org](http://www.w3.org/2000/svg)"
              >
                <path
                  d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"
                  fill="#4285F4"
                />
                <path
                  d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"
                  fill="#34A853"
                />
                <path
                  d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"
                  fill="#FBBC05"
                />
                <path
                  d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"
                  fill="#EA4335"
                />
              </svg>
              Continue with Google
            </button>
            <button type="button" class="btn-social">
              <!-- Facebook -->
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                xmlns="[w3.org](http://www.w3.org/2000/svg)"
              >
                <circle cx="9" cy="9" r="9" fill="#1877F2" />
                <path
                  d="M12.47 11.25l.38-2.47H10.4V7.24c0-.68.33-1.33 1.39-1.33h1.08V3.79s-.98-.17-1.92-.17c-1.96 0-3.24 1.19-3.24 3.34v1.82H5.53v2.47h2.18V18h2.68v-6.75h2.08Z"
                  fill="#fff"
                />
              </svg>
              Continue with Facebook
            </button>
          </div>
        </form>
      </div>
      <!-- ══ END RIGHT PANEL ══ -->
    </div>
    <!-- /card -->

    <script>
      /* ── Password toggle ── */
      function togglePassword() {
        const inp = document.getElementById("password");
        const closed = document.getElementById("eyeClosed");
        const open = document.getElementById("eyeOpen");
        if (inp.type === "password") {
          inp.type = "text";
          closed.style.display = "none";
          open.style.display = "block";
        } else {
          inp.type = "password";
          closed.style.display = "block";
          open.style.display = "none";
        }
      }

      /* ── Form switch ── */
      function toggleForm(e) {
        e.preventDefault();
        const title = document.querySelector(".form-title");
        const subtitle = document.querySelector(".form-subtitle");
        const btn = document.querySelector(".btn-create");
        const isSignup = title.textContent.trim() === "Create an Account";
        if (isSignup) {
          title.textContent = "Welcome Back";
          subtitle.innerHTML = `Don't have an account? <a href="#" onclick="toggleForm(event)">Sign up</a>`;
          btn.textContent = "Log In";
        } else {
          title.textContent = "Create an Account";
          subtitle.innerHTML = `Already have an account? <a href="#" onclick="toggleForm(event)">Log in</a>`;
          btn.textContent = "Create Account";
        }
      }

      /* ── Submit ── */
      function handleSubmit(e) {
        e.preventDefault();
        const terms = document.getElementById("terms");
        if (!terms.checked) {
          alert("Please accept the Terms & Conditions to continue.");
          return;
        }
        alert("Account created successfully! Welcome to LegacyAwards.");
      }

      /* ── Background floating particles ── */
      const bp = document.getElementById("bgParticles");
      const colors = [
        "rgba(255,200,50,0.5)",
        "rgba(180,100,255,0.4)",
        "rgba(80,150,255,0.4)",
        "rgba(255,255,255,0.25)",
      ];
      for (let i = 0; i < 22; i++) {
        const s = document.createElement("span");
        const size = Math.random() * 5 + 1.5;
        s.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%;
        bottom:${Math.random() * 10}%;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration:${8 + Math.random() * 12}s;
        animation-delay:${Math.random() * 10}s;
        filter:blur(${Math.random() * 1.5}px);
      `;
        bp.appendChild(s);
      }

      /* ── Dust particles inside left panel ── */
      const dc = document.getElementById("dustContainer");
      for (let i = 0; i < 18; i++) {
        const d = document.createElement("div");
        d.className = "dust-dot";
        const size = Math.random() * 3 + 1;
        d.style.cssText = `
        width:${size}px; height:${size}px;
        left:${25 + Math.random() * 50}%;
        bottom:${20 + Math.random() * 20}%;
        animation-duration:${3 + Math.random() * 5}s;
        animation-delay:${Math.random() * 6}s;
        filter:blur(${Math.random()}px);
      `;
        dc.appendChild(d);
      }
    </script>
  </body>
</html>
